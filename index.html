<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Lutte — Programme</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#07070f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Prog Lutte">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070f;--bg2:#0d0d1a;--bg3:#14142a;--bg4:#1a1a33;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --text:#ececf4;--dim:rgba(236,236,244,0.45);--dim2:rgba(236,236,244,0.22);
  --red:#e63946;--force:#7c5cfc;--explo:#ff6b35;--lact:#e63946;--plyo:#30d158;--endu:#ff9f0a;
  --lutte-c:#0ea5e9;--ppg-c:#a3e635;
  --r:16px
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.hdr{padding:36px 24px 0;max-width:1400px;margin:0 auto}
.hdr-row{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:10px}
.title{font-size:clamp(48px,10vw,100px);font-weight:900;line-height:.9;letter-spacing:-3px;background:linear-gradient(135deg,#fff 20%,rgba(255,255,255,.4));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.badge{background:var(--red);color:#fff;font-size:10px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;padding:6px 14px;border-radius:100px;align-self:flex-end;margin-bottom:4px}
.stats{display:flex;gap:24px;margin-top:12px;flex-wrap:wrap}
.sv{font-size:30px;font-weight:900;color:var(--red);line-height:1}
.sl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-top:2px}
.sep{height:1px;background:var(--border);margin-top:24px}
.ctrl{max-width:1400px;margin:20px auto 0;padding:0 24px;display:flex;gap:8px;flex-wrap:wrap}
.wb{background:var(--bg3);border:1px solid var(--border);color:var(--dim);font:700 13px/1 inherit;padding:10px 24px;border-radius:100px;cursor:pointer;transition:.18s all}
.wb:hover:not(.on){border-color:var(--border2);color:var(--text)}
.wb.on{background:var(--red);border-color:var(--red);color:#fff}
.wb.dl{border-style:dashed}
.wb.dl.on{background:var(--endu);border-color:var(--endu)}
.cal{max-width:1400px;margin:18px auto 0;padding:0 24px 100px;display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
@media(max-width:900px){.cal{grid-template-columns:repeat(4,1fr)}}
@media(max-width:560px){.cal{grid-template-columns:repeat(2,1fr);padding:0 14px 100px}}
.dc{display:flex;flex-direction:column;gap:6px}
.dn{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--dim);padding-bottom:4px}
.sc{position:relative;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:15px 13px;cursor:pointer;overflow:hidden;transition:.2s;min-height:175px;display:flex;flex-direction:column}
.sc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:var(--r) 0 0 var(--r)}
.sc:hover{transform:translateY(-3px);border-color:var(--border2);background:var(--bg3)}
.sc.force::before{background:var(--force)}.sc.explo::before{background:var(--explo)}
.sc.lact::before{background:var(--lact)}.sc.plyo::before{background:var(--plyo)}.sc.endu::before{background:var(--endu)}
.sc.lutte_c::before{background:var(--lutte-c)}.sc.ppg_c::before{background:var(--ppg-c)}
.sc.ppg_c{cursor:default}
.sc.ppg_c:hover{transform:none;background:var(--bg2);border-color:var(--border)}
.sbg{display:inline-flex;font-size:8px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:3px 8px;border-radius:100px;margin-bottom:6px;width:fit-content}
.force .sbg{background:rgba(124,92,252,.12);color:var(--force)}.explo .sbg{background:rgba(255,107,53,.12);color:var(--explo)}
.lact .sbg{background:rgba(230,57,70,.12);color:var(--lact)}.plyo .sbg{background:rgba(48,209,88,.12);color:var(--plyo)}
.endu .sbg{background:rgba(255,159,10,.12);color:var(--endu)}
.si{font-size:20px;margin-bottom:7px;display:block}
.st{font-size:12.5px;font-weight:800;line-height:1.3;flex:1}
.ss{font-size:11px;color:var(--dim);margin-top:3px;line-height:1.4}
.sf{display:flex;align-items:center;gap:5px;margin-top:12px}
.dots{display:flex;gap:3px}
.dot{width:5px;height:5px;border-radius:50%;background:var(--border2)}
.force .dot.on{background:var(--force)}.explo .dot.on{background:var(--explo)}
.lact .dot.on{background:var(--lact)}.plyo .dot.on{background:var(--plyo)}.endu .dot.on{background:var(--endu)}
.sdur{font-size:10px;font-weight:700;color:var(--dim);margin-left:auto}
.ltheme{font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:rgba(14,165,233,.65);margin-bottom:5px}
.ltechs{font-size:10px;color:rgba(14,165,233,.45);margin-top:5px;line-height:1.4}
.rc{border:1px dashed var(--border);border-radius:var(--r);min-height:175px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;opacity:.35}
.ri{font-size:26px}.rl{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--dim)}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:200;opacity:0;pointer-events:none;transition:.25s}
.ov.open{opacity:1;pointer-events:all}
.pnl{position:fixed;right:0;top:0;bottom:0;width:min(520px,100vw);background:var(--bg2);border-left:1px solid var(--border);z-index:201;overflow-y:auto;transform:translateX(100%);transition:.32s transform cubic-bezier(.4,0,.2,1)}
.pnl.open{transform:translateX(0)}
.pnl::-webkit-scrollbar{width:3px}
.pnl::-webkit-scrollbar-thumb{background:rgba(255,255,255,.07);border-radius:2px}
.ph{padding:26px 26px 18px;position:sticky;top:0;background:var(--bg2);border-bottom:1px solid var(--border);z-index:1}
.pc{width:32px;height:32px;border-radius:50%;background:var(--bg4);border:1px solid var(--border);color:var(--text);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-bottom:16px;transition:.15s}
.pc:hover{background:rgba(255,255,255,.1)}
.pbg{display:inline-block;font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:4px 11px;border-radius:100px;margin-bottom:9px}
.ptit{font-size:22px;font-weight:900;line-height:1.15;letter-spacing:-.4px;margin-bottom:5px}
.psub{font-size:13px;color:var(--dim);margin-bottom:14px}
.pch{display:flex;gap:6px;flex-wrap:wrap}
.chip{background:var(--bg4);border:1px solid var(--border);border-radius:100px;padding:5px 11px;font-size:11px;font-weight:700;color:var(--dim);display:flex;align-items:center;gap:4px}
.pb{padding:20px 26px 48px}
.slbl{font-size:9px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:var(--dim);display:flex;align-items:center;gap:10px;margin-bottom:10px}
.slbl::after{content:'';flex:1;height:1px;background:var(--border)}
.wu{background:var(--bg3);border:1px solid var(--border);border-radius:11px;padding:12px 14px;margin-bottom:20px;list-style:none}
.wu li{font-size:12.5px;color:var(--dim);line-height:1.7;padding-left:12px;position:relative}
.wu li::before{content:'–';position:absolute;left:0;color:var(--dim2)}
.bloc{margin-bottom:16px}
.bh{display:flex;align-items:center;gap:9px;margin-bottom:7px;flex-wrap:wrap}
.bn{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff;flex-shrink:0}
.bname{font-size:13px;font-weight:800;flex:1;min-width:120px}
.bser{font-size:10px;font-weight:700;color:var(--dim);background:var(--bg4);border-radius:100px;padding:2px 8px}
.brest{font-size:10px;font-weight:700;color:#ffcf70;background:rgba(255,159,10,.12);border-radius:100px;padding:2px 8px;white-space:nowrap}
.exl{display:flex;flex-direction:column;gap:4px;padding-left:33px}
.ex{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 12px;display:flex;gap:10px;align-items:flex-start}
.ex-ico{width:36px;height:36px;border-radius:9px;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;border:1px solid var(--border)}
.ex-ico.shot{padding:0;overflow:hidden;position:relative;cursor:zoom-in;border-color:var(--border2)}
.ex-ico.shot img{width:100%;height:100%;object-fit:cover;display:block}
.ex-ico.shot.ill{background:#fff}
.ex-ico.shot.ill img{object-position:left center}
.ex-ico.shot::after{content:'⤢';position:absolute;right:0;bottom:0;font-size:8px;line-height:1.3;color:#fff;background:rgba(0,0,0,.6);border-radius:5px 0 6px 0;padding:0 3px}
.ex-body{flex:1;min-width:0}
.en{font-size:12.5px;font-weight:700;line-height:1.3}
.ed{font-size:11px;color:var(--dim);margin-top:2px;line-height:1.4}
.nbox{background:linear-gradient(135deg,rgba(124,92,252,.08),rgba(230,57,70,.08));border:1px solid rgba(124,92,252,.16);border-radius:11px;padding:13px 15px;margin-top:18px}
.ntit{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--force);margin-bottom:7px}
.ntxt{font-size:12.5px;color:var(--dim);line-height:1.65}
.cd{background:var(--bg3);border:1px solid var(--border);border-radius:11px;padding:12px 14px;margin-top:8px;font-size:12.5px;color:var(--dim);line-height:1.65}
.lbtn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--dim);font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;margin-top:6px;display:inline-block}
.lbtn:hover{border-color:var(--border2);color:var(--text)}
.lf{display:none;gap:6px;align-items:center;margin-top:6px;flex-wrap:wrap}
.lf.open{display:flex}
.li{background:var(--bg4);border:1px solid var(--border);border-radius:8px;padding:5px 8px;color:var(--text);font-size:12px;width:68px;outline:none;-moz-appearance:textfield}
.li::-webkit-outer-spin-button,.li::-webkit-inner-spin-button{-webkit-appearance:none}
.li::placeholder{color:var(--dim2)}
.li:focus{border-color:var(--border2)}
.li.wide{width:130px}
.lsave{background:var(--force);border:none;border-radius:8px;color:#fff;font-size:11px;font-weight:700;padding:5px 10px;cursor:pointer}
.ll{font-size:10px;color:var(--dim);margin-top:4px;display:block;line-height:1.4}
.ll em{font-style:normal;color:var(--dim2)}
.pm{position:fixed;inset:0;z-index:300;background:var(--bg);overflow-y:auto;transform:translateY(100%);transition:.32s transform cubic-bezier(.4,0,.2,1)}
.pm.open{transform:translateY(0)}
.pm-hdr{padding:20px 24px 0;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:1}
.pm-hdr-row{display:flex;align-items:center;gap:10px;padding-bottom:14px}
.pm-tit{font-size:18px;font-weight:900;flex:1}
.pm-body{max-width:700px;margin:0 auto;padding:20px 24px 100px}
.pm-tabs{display:flex;border-bottom:1px solid var(--border)}
.pm-tab{flex:1;padding:10px;text-align:center;font-size:12px;font-weight:700;color:var(--dim);cursor:pointer;transition:.15s;border-bottom:2px solid transparent;margin-bottom:-1px}
.pm-tab.on{color:var(--text);border-bottom-color:var(--red)}
.pm-tab:hover:not(.on){color:rgba(236,236,244,.7)}
.export-btn{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--dim);font-size:11px;font-weight:700;padding:6px 12px;cursor:pointer;transition:.15s;white-space:nowrap}
.export-btn:hover{border-color:var(--border2);color:var(--text)}
.exr{background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden}
.exr-hd{display:flex;align-items:center;padding:14px 16px;cursor:pointer;gap:10px}
.exr:hover .exr-hd{background:rgba(255,255,255,.02)}
.exr-n{font-size:13px;font-weight:700;flex:1}
.exr-meta{font-size:11px;color:var(--dim);text-align:right;flex-shrink:0}
.exr-det{display:none;border-top:1px solid var(--border);padding:12px 16px}
.exr-det.open{display:block}
.hrow{display:grid;grid-template-columns:95px 65px 50px 1fr;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:11px;align-items:center}
.hrow:last-of-type{border-bottom:none}
.hrow-hd{font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--dim)}
.tu{color:var(--plyo)}.td{color:var(--lact)}.tf{color:var(--dim2)}
.delbtn{background:none;border:1px solid rgba(230,57,70,.3);border-radius:6px;color:rgba(230,57,70,.7);font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;margin-top:10px}
.delbtn:hover{border-color:var(--lact);color:var(--lact)}
.empty-prog{text-align:center;padding:60px 20px;color:var(--dim)}
.empty-prog .ep-i{font-size:48px;margin-bottom:16px}
.empty-prog p{font-size:13px;line-height:1.7}
.fab{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-size:20px;cursor:pointer;z-index:100;transition:.2s;box-shadow:0 4px 20px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center}
.fab:hover{background:var(--bg4);transform:scale(1.08)}
.dn-today{color:var(--text)!important}
.dn-today::after{content:' ●';color:var(--red);font-size:7px;vertical-align:middle}
.sc-today{border-color:rgba(230,57,70,.45)!important}
.today-badge{position:absolute;top:9px;right:9px;font-size:8px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--red);background:rgba(230,57,70,.1);border-radius:100px;padding:2px 7px}
.date-line{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--dim)}
.date-dot{width:6px;height:6px;border-radius:50%;background:var(--red);flex-shrink:0;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.dash-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 12px}
.dash-val{font-size:22px;font-weight:900;color:var(--text);line-height:1}
.dash-lbl{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-top:4px}
.ex-dash{background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;padding:13px 14px}
.ex-dash-row{display:flex;align-items:center;gap:10px}
.ex-dash-name{font-size:12px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ex-dash-pr{text-align:right;flex-shrink:0}
.ex-dash-prval{font-size:18px;font-weight:900;color:var(--text);line-height:1}
.ex-dash-prlbl{font-size:8px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--dim)}
.vol-section{margin-bottom:20px}
.vol-lbl{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-bottom:10px}
.spark{display:block;flex-shrink:0}
.lb{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.9);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:24px;opacity:0;pointer-events:none;transition:.2s}
.lb.open{opacity:1;pointer-events:all}
.lb img{max-width:100%;max-height:76vh;border-radius:14px;border:1px solid var(--border2);box-shadow:0 12px 50px rgba(0,0,0,.6)}
.lb-cap{font-size:14px;font-weight:800;color:var(--text);text-align:center;max-width:90%;line-height:1.3}
.lb-sub{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--dim)}
.lb-x{position:absolute;top:18px;right:18px;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid var(--border2);color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lb-x:hover{background:rgba(255,255,255,.2)}
.tmr-step{font-size:11px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:var(--dim)}
.tmr-name{font-size:20px;font-weight:800;color:#fff;text-align:center;max-width:300px;line-height:1.3}
.tmr-ring{position:relative;width:200px;height:200px;flex-shrink:0}
.tmr-ring svg{transform:rotate(-90deg)}
.tmr-bg{fill:none;stroke:rgba(255,255,255,.08);stroke-width:10}
.tmr-fg{fill:none;stroke:#7c5cfc;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .95s linear}
.tmr-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:58px;font-weight:900;color:#fff;letter-spacing:-2px}
.tmr-next{font-size:13px;color:var(--dim);text-align:center;min-height:20px}
.tmr-btn{border:none;border-radius:50px;padding:12px 24px;font-size:14px;font-weight:800;cursor:pointer}
.tmr-pause{background:rgba(255,255,255,.1);color:#fff}
.tmr-stop{background:rgba(230,57,70,.15);color:var(--lact)}
.blaunch{margin-left:auto;background:none;border:1px solid currentColor;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:800;cursor:pointer;letter-spacing:.02em;transition:.15s opacity;flex-shrink:0}
.blaunch:hover{opacity:.65}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-row">
    <div class="title">LUTTE</div>
    <div class="badge">Gréco-Romaine</div>
  </div>
  <div class="stats">
    <div><div class="sv">15</div><div class="sl">Séances</div></div>
    <div><div class="sv">5</div><div class="sl">Semaines</div></div>
    <div><div class="sv">7/7</div><div class="sl">Jours actifs</div></div>
    <div><div class="sv">~960</div><div class="sl">Min / Cycle</div></div>
  </div>
  <div class="sep"></div>
</div>
<div class="ctrl">
  <button class="wb on" id="b1" onclick="sw(1)">Semaine 1</button>
  <button class="wb" id="b2" onclick="sw(2)">Semaine 2</button>
  <button class="wb" id="b3" onclick="sw(3)">Semaine 3</button>
  <button class="wb" id="b4" onclick="sw(4)">Semaine 4</button>
  <button class="wb dl" id="b5" onclick="sw(5)">♥ Décharge</button>
  <div class="date-line" id="date-line"></div>
</div>
<div class="cal" id="cal"></div>
<div class="ov" id="ov" onclick="close_()"></div>
<div class="pnl" id="pnl">
  <div class="ph" id="ph"></div>
  <div class="pb" id="pb"></div>
</div>
<div class="pm" id="pm">
  <div class="pm-hdr">
    <div class="pm-hdr-row">
      <button class="pc" style="margin-bottom:0" onclick="closeProgress()">✕</button>
      <div class="pm-tit">Progression</div>
      <button class="export-btn" onclick="exportLogs()">⬇ Export</button>
    </div>
    <div class="pm-tabs">
      <div class="pm-tab on" id="tab-hist" onclick="switchTab('hist')">Historique</div>
      <div class="pm-tab" id="tab-dash" onclick="switchTab('dash')">Dashboard</div>
    </div>
  </div>
  <div class="pm-body" id="pm-body"></div>
</div>
<div class="lb" id="lb" onclick="closeShot(event)">
  <button class="lb-x" onclick="closeShot()">✕</button>
  <img id="lb-img" src="" alt="">
  <div class="lb-cap" id="lb-cap"></div>
  <div class="lb-sub" id="lb-sub"></div>
</div>
<div id="tmr-ov" style="display:none;position:fixed;inset:0;background:rgba(7,7,15,.97);z-index:500;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px">
  <button class="lb-x" onclick="stopTimer()">✕</button>
  <div id="tmr-step" class="tmr-step"></div>
  <div id="tmr-name" class="tmr-name"></div>
  <div class="tmr-ring">
    <svg width="200" height="200" viewBox="0 0 200 200"><circle class="tmr-bg" cx="100" cy="100" r="85"/><circle id="tmr-fg" class="tmr-fg" cx="100" cy="100" r="85"/></svg>
    <div id="tmr-num" class="tmr-num"></div>

function sparkline(entries,w,h){
  w=w||72;h=h||28;
  const wts=entries.map(e=>e.weight).filter(Boolean);
  if(wts.length<2) return `<svg width="${w}" height="${h}" class="spark">${wts.length?`<circle cx="${w/2}" cy="${h/2}" r="2.5" fill="rgba(124,92,252,.6)"/>`:''}` +'</svg>';
  const mn=Math.min(...wts),mx=Math.max(...wts),range=mx-mn||1,n=wts.length,pad=4;
  const pts=wts.map((v,i)=>{
    const x=pad+(i/(n-1))*(w-2*pad);
    const y=h-pad-((v-mn)/range)*(h-2*pad);
    return x.toFixed(1)+','+y.toFixed(1);
  }).join(' ');
  const last=wts[n-1],first=wts[0];
  const col=last>first?'#30d158':last<first?'#e63946':'#7c5cfc';
  const lp=pts.split(' ').pop().split(',');
  return `<svg width="${w}" height="${h}" class="spark"><polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity=".8"/><circle cx="${lp[0]}" cy="${lp[1]}" r="2.5" fill="${col}"/></svg>`;
}
function getPR(name){
  const logs=LOGS[name];if(!logs) return null;
  const wts=logs.map(e=>e.weight).filter(Boolean);
  return wts.length?Math.max(...wts):null;
}
function weeklyVolume(){
  const b=[{l:'S-4',v:0},{l:'S-3',v:0},{l:'S-2',v:0},{l:'S-1',v:0},{l:'Cette s.',v:0}];
  const now=new Date();now.setHours(23,59,59,999);
  Object.values(LOGS).forEach(entries=>entries.forEach(e=>{
    if(!e.weight||!e.reps) return;
    const d=new Date(e.date+'T00:00:00');
    const wi=4-Math.floor((now-d)/864e5/7);
    if(wi>=0&&wi<=4) b[wi].v+=e.weight*e.reps;
  }));
  return b;
}
function volChart(weeks){
  const mx=Math.max(...weeks.map(w=>w.v),1),H=70,pad=8,gap=5,VW=260;
  const bw=(VW-pad*2-gap*(weeks.length-1))/weeks.length;
  let s=`<svg viewBox="0 0 ${VW} ${H+18}" style="width:100%;display:block">`;
  weeks.forEach((w,i)=>{
    const x=pad+i*(bw+gap),bh=w.v>0?Math.max(4,(w.v/mx)*H):0,y=H-bh;
    const fill=i===weeks.length-1?'rgba(230,57,70,.7)':'rgba(124,92,252,.45)';
    if(bh>0){
      s+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" rx="3" fill="${fill}"/>`;
      if(bh>14) s+=`<text x="${(x+bw/2).toFixed(1)}" y="${(y-3).toFixed(1)}" text-anchor="middle" font-size="8" fill="rgba(236,236,244,.45)">${w.v>=1000?(w.v/1000).toFixed(1)+'k':w.v}</text>`;
    }
    s+=`<text x="${(x+bw/2).toFixed(1)}" y="${(H+13).toFixed(1)}" text-anchor="middle" font-size="8" fill="rgba(236,236,244,.35)">${w.l}</text>`;
  });
  return s+'</svg>';
}

      </div>
      ${progress?`<div style="margin-top:6px">${progress}</div>`:''}
    </div>`;
  });
  return html;
}
let pmTab='hist';
function switchTab(t){
  pmTab=t;
  document.getElementById('tab-hist').classList.toggle('on',t==='hist');
  document.getElementById('tab-dash').classList.toggle('on',t==='dash');
  document.getElementById('pm-body').innerHTML=t==='hist'?renderHistory():renderDashboard();
}
function exportLogs(){
  if(!Object.keys(LOGS).length){alert('Aucune donnée à exporter.');return;}
  const blob=new Blob([JSON.stringify(LOGS,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='lutte_logs_'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function openProgress(){
  pmTab='hist';
  document.getElementById('tab-hist').classList.add('on');
  document.getElementById('tab-dash').classList.remove('on');
  document.getElementById('pm-body').innerHTML=renderHistory();
  document.getElementById('pm').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeProgress(){
  document.getElementById('pm').classList.remove('open');
  document.body.style.overflow='';
}
function toggleExDet(i){
  document.getElementById('exdet'+i).classList.toggle('open');
}
function deleteLogs(name){
  if(confirm('Supprimer tout l\'historique de "'+name+'" ?')){
    delete LOGS[name];
    saveLogs();
    document.getElementById('pm-body').innerHTML=pmTab==='dash'?renderDashboard():renderHistory();
  }
}
function openShot(src,cap,type){
  document.getElementById('lb-img').src=src;
  document.getElementById('lb-cap').textContent=cap;
  document.getElementById('lb-sub').textContent=type||'';
  document.getElementById('lb').classList.add('open');
}
function closeShot(e){
  if(e&&e.target&&e.target.id==='lb-img') return;
  document.getElementById('lb').classList.remove('open');
}
function parseDur(d){
  if(!d) return null;
  const s=d.toLowerCase();
  const m=s.match(/^(\d+)\s*min/);
  if(m){const v=parseInt(m[1])*60;return v<=600?v:null;}
  const m2=s.match(/^(\d+)\s*sec/);
  if(m2) return parseInt(m2[1]);
  return null;
}
function isCircuit(bl){return bl.ex.filter(e=>parseDur(e.d)!==null).length>=2;}
const _C=2*Math.PI*85;
let _tmr={iv:null,paused:false,exs:[],idx:0,total:0,rem:0};
function launchCircuit(blIdx,sid){
  const bl=S[sid].blocs[blIdx];
  const exs=bl.ex.filter(e=>parseDur(e.d)!==null).map(e=>({n:e.n,dur:parseDur(e.d)}));
  if(!exs.length) return;
  clearInterval(_tmr.iv);
  _tmr={iv:null,paused:false,exs,idx:0,total:exs[0].dur,rem:exs[0].dur};
  document.getElementById('tmr-ov').style.display='flex';
  _tmrRender();
  _tmrTick();
}
function _tmrRender(){
  const ex=_tmr.exs[_tmr.idx];
  const next=_tmr.exs[_tmr.idx+1];
  const r=_tmr.rem;
  document.getElementById('tmr-step').textContent=(_tmr.idx+1)+' / '+_tmr.exs.length;
  document.getElementById('tmr-name').textContent=ex.n;
  document.getElementById('tmr-num').textContent=r>60?Math.floor(r/60)+'m'+String(r%60).padStart(2,'0'):r;
  document.getElementById('tmr-next').textContent=next?'Suivant : '+next.n:'Dernier exercice';
  const fg=document.getElementById('tmr-fg');
  fg.style.strokeDasharray=_C;
  fg.style.strokeDashoffset=_C*(1-r/_tmr.total);
}
function _tmrTick(){
  _tmr.iv=setInterval(()=>{
    if(_tmr.paused) return;
    _tmr.rem--;
    _tmrRender();
    if(_tmr.rem>0) return;
    clearInterval(_tmr.iv);
    _beep();
    const ni=_tmr.idx+1;
    if(ni<_tmr.exs.length){
      _tmr.idx=ni;_tmr.total=_tmr.exs[ni].dur;_tmr.rem=_tmr.exs[ni].dur;
      setTimeout(()=>{_tmrRender();_tmrTick();},1200);
    } else {
      document.getElementById('tmr-num').textContent='✓';
      document.getElementById('tmr-name').textContent='Circuit terminé !';
      document.getElementById('tmr-next').textContent='';
      setTimeout(stopTimer,2000);
    }
  },1000);
}
function pauseTimer(){
  _tmr.paused=!_tmr.paused;
  document.getElementById('tmr-pause').textContent=_tmr.paused?'▶ Reprendre':'⏸ Pause';
}
function stopTimer(){
  clearInterval(_tmr.iv);
  _tmr.paused=false;
  document.getElementById('tmr-ov').style.display='none';
  document.getElementById('tmr-pause').textContent='⏸ Pause';
}
function _beep(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,.15,.3].forEach((t,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=i===2?1320:880;
      g.gain.setValueAtTime(.25,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+.18);
      o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.2);
    });
  }catch(e){}
  if(navigator.vibrate) navigator.vibrate([100,50,100]);
}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeShot();close_();closeProgress();stopTimer();}});
currentWeekNum=getCurrentWeek();
todayIdx=getTodayDayIndex();
sw(currentWeekNum);
updateDateLine();
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
